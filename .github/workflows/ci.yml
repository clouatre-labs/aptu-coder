name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/aptu-coder-core/**'
      - 'crates/aptu-coder/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'clippy.toml'
      - '.github/workflows/**'
      - 'tests/**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04-arm
    outputs:
      code: ${{ steps.filter.outputs.code }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Detect file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            code:
              - 'crates/aptu-coder-core/**'
              - 'crates/aptu-coder/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - '.github/workflows/**'
              - 'tests/**'
            workflows:
              - '.github/workflows/**'

  commitlint:
    name: Lint Commits
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Cache npm
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.npm
          key: commitlint-${{ hashFiles('.commitlintrc.yml', '.github/workflows/ci.yml') }}
          restore-keys: commitlint-
      - name: Install commitlint
        run: |
          npm install --no-save \
            @commitlint/cli@20.5.3 \
            @commitlint/config-conventional@20.5.3
      - name: Validate commit messages
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  check-base:
    name: Check Branch Base
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Verify branch is rebased on main
        run: |
          git fetch origin main
          base_commit=$(git merge-base origin/main HEAD)
          main_head=$(git rev-parse origin/main)
          if [ "$base_commit" != "$main_head" ]; then
            behind=$(git rev-list --count "$base_commit".."$main_head")
            echo "::error::Branch is $behind commit(s) behind main. Rebase required."
            echo "Run: git fetch origin && git rebase origin/main"
            exit 1
          fi
          echo "Branch is up to date with main."

  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: workspace-lint
          cache-targets: false
          save-if: true
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy lints
        run: cargo clippy --locked --profile ci -- -D warnings -W clippy::cognitive_complexity
      - name: Check SPDX headers
        run: |
          rg --files crates/ | rg '\.rs$' | while read -r f; do
            if ! rg -q 'SPDX-FileCopyrightText:' "$f"; then
              echo "::error file=$f::Missing SPDX-FileCopyrightText header in $f"
              exit 1
            fi
            if ! rg -q 'SPDX-License-Identifier: Apache-2.0' "$f"; then
              echo "::error file=$f::Missing SPDX-License-Identifier header in $f"
              exit 1
            fi
          done

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: workspace-cov
          save-if: true
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@682e7d9e49c5e653d371fc6adbda67653461378a # v2.82.4
        with:
          tool: cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@682e7d9e49c5e653d371fc6adbda67653461378a # v2.82.4
        with:
          tool: cargo-nextest
      - name: Coverage
        run: |
          cargo llvm-cov nextest --locked --no-report --all-features \
            --workspace \
            -E 'not binary(mcp_smoke)'
          cargo llvm-cov report --locked -p aptu-coder-core \
            --fail-under-lines 90 \
            --fail-under-regions 80 \
            --lcov --output-path lcov-core.info
          # aptu-coder coverage tracked but not gated (transport/logging/metrics layer)
          cargo llvm-cov report --locked -p aptu-coder \
            --lcov --output-path lcov-mcp.info || true


  deny:
    name: Audit Dependencies
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request')
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install cargo-deny
        uses: taiki-e/install-action@682e7d9e49c5e653d371fc6adbda67653461378a # v2.82.4
        with:
          tool: cargo-deny
      - name: Check advisories and licenses
        run: cargo deny check advisories licenses
      - name: Check package age
        run: bash .github/scripts/check-package-age.sh

  msrv:
    name: MSRV Check
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.96.0"
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: false
          save-if: true
      - name: Check MSRV
        run: cargo check --locked

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04-arm
    needs: changes
    timeout-minutes: 10
    if: needs.changes.outputs.workflows == 'true' || github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          min-severity: high

  semver-checks:
    name: semver checks
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'pull_request'
    # aptu-coder-core is published on crates.io with 25+ versions.
    # If the crate is not yet found (e.g. first publish after rename), the step skips gracefully.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Check crate is published on crates.io
        id: published
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A 'rust-cargo/1.0' https://crates.io/api/v1/crates/aptu-coder-core)
          if [[ "$STATUS" == "200" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "aptu-coder-core not yet published on crates.io (HTTP $STATUS); skipping semver check."
          fi
      - name: Install cargo-semver-checks
        if: steps.published.outputs.available == 'true'
        env:
          VERSION: "0.48.0"
          SHA256: "1bc0d4d70af9c3ae086af958e67da2a12eaa4978896596f5499792755b62ea60"
        run: |
          curl -fsSL "https://github.com/obi1kenobi/cargo-semver-checks/releases/download/v${VERSION}/cargo-semver-checks-aarch64-unknown-linux-gnu.tar.gz" \
            -o cargo-semver-checks.tar.gz
          echo "${SHA256}  cargo-semver-checks.tar.gz" | sha256sum -c -
          tar -xzf cargo-semver-checks.tar.gz
          mv cargo-semver-checks ~/.cargo/bin/cargo-semver-checks
          chmod +x ~/.cargo/bin/cargo-semver-checks
      - name: Run semver checks
        if: steps.published.outputs.available == 'true'
        run: cargo semver-checks --package aptu-coder-core

  ci-result:
    name: CI Result
    runs-on: ubuntu-24.04-arm
    if: always()
    needs: [changes, commitlint, check-base, lint, coverage, deny, msrv, zizmor, semver-checks]
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed or were skipped."

name: Review Pull Requests

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch: # Manual trigger for testing

permissions: {}

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-24.04-arm
    permissions:
      pull-requests: write
      issues: write
      contents: read
      attestations: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Review PR
        uses: clouatre-labs/aptu@5545c56f0f4bf52a3dc918ec48a56c309280447c # v0.10.1
        continue-on-error: true  # Non-blocking - AI review is advisory
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          provider: gemini
          model: gemini-3.1-flash-lite
          skip-labeled: 'false'
          fallback-provider: 'openrouter'
          fallback-model: 'inception/mercury-2'
          instructions-file: .github/instructions/pr-review.md
          repo-path: ${{ github.workspace }}
          max-prompt-chars: 200000
